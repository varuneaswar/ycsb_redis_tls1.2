# Continuous integration: compiles the YCSB Redis binding and stores the
# distribution archive as a downloadable workflow artifact on every push
# and pull request targeting the default branch.

name: CI – Build YCSB Redis Binding

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Redis binding distribution package
        run: mvn -pl redis -am package -DskipTests -q

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ycsb-redis-binding-snapshot
          path: redis/target/ycsb-redis-binding-*.tar.gz
          if-no-files-found: error
          retention-days: 30
